<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标签分类 - DevPilot</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="../../assets/common.css" />
  <style>
    [v-cloak] { display: none !important; }
    .tag-color-0 { background:#eff6ff; color:#3b82f6; border-color:#bfdbfe; }
    .tag-color-1 { background:#f0fdf4; color:#22c55e; border-color:#bbf7d0; }
    .tag-color-2 { background:#fffbeb; color:#d97706; border-color:#fde68a; }
    .tag-color-3 { background:#fef2f2; color:#ef4444; border-color:#fecaca; }
    .tag-color-4 { background:#f5f3ff; color:#7c3aed; border-color:#ddd6fe; }
    .tag-color-5 { background:#fdf2f8; color:#db2777; border-color:#fbcfe8; }
    .tag-color-6 { background:#ecfeff; color:#0891b2; border-color:#a5f3fc; }
    .tag-color-7 { background:#fefce8; color:#ca8a04; border-color:#fef08a; }
  </style>
</head>
<body>
<div id="app" v-cloak>
  <el-container class="layout">
    <!-- 侧边栏 -->
    <el-aside :width="sidebarWidth" class="sidebar">
      <div class="sidebar-logo"><span>🚀 DevPilot</span></div>
      <el-menu :default-active="activeMenu" background-color="#1e293b" text-color="#cbd5e1" active-text-color="#3b82f6" @select="onMenuSelect">
        <el-menu-item v-for="item in menuList" :key="item.key" :index="item.key">
          <span>{{ item.label }}</span>
        </el-menu-item>
      </el-menu>
    </el-aside>

    <el-container class="main-area">
      <!-- 顶部栏 -->
      <el-header>
        <div class="topbar">
          <el-breadcrumb separator="/">
            <el-breadcrumb-item>标签分类</el-breadcrumb-item>
            <el-breadcrumb-item>列表</el-breadcrumb-item>
          </el-breadcrumb>
        </div>
        <div>
          <el-dropdown>
            <span class="user-dropdown">{{ currentUser }} <el-icon><arrow-down></arrow-down></el-icon></span>
            <template #dropdown>
              <el-dropdown-item @click="handleLogout">退出登录</el-dropdown-item>
            </template>
          </el-dropdown>
        </div>
      </el-header>

      <el-main>
        <!-- 标签表格 -->
        <el-card shadow="never">
          <div class="action-bar">
            <div class="left">
              <el-button type="primary" @click="handleAdd">+ 新建标签</el-button>
            </div>
          </div>
          <el-table style="width:100%" :data="tagList" border stripe>
            <el-table-column type="index" label="#" width="55"></el-table-column>
            <el-table-column prop="name" label="标签名称" min-width="160">
              <template #default="{ row, $index }">
                <el-tag :class="'tag-color-' + ($index % 8)" size="default" effect="plain">{{ row.name }}</el-tag>
              </template>
            </el-table-column>
            <el-table-column prop="noteCount" label="关联笔记数" width="120" align="center">
              <template #default="{ row }">
                <el-button type="primary" link @click="handleViewNotes(row)">{{ row.noteCount }}</el-button>
              </template>
            </el-table-column>
            <el-table-column prop="createdAt" label="创建时间" width="180"></el-table-column>
            <el-table-column label="操作" width="160" fixed="right">
              <template #default="{ row }">
                <el-button type="primary" link size="small" @click="handleEdit(row)">编辑</el-button>
                <el-popconfirm :title="'确定删除标签「' + row.name + '」？关联的 ' + row.noteCount + ' 条笔记将失去此标签'" @confirm="handleDelete(row)">
                  <template #reference>
                    <el-button type="danger" link size="small">删除</el-button>
                  </template>
                </el-popconfirm>
              </template>
            </el-table-column>
          </el-table>
          <div class="pagination-container">
            <el-pagination v-model:current-page="pagination.page" v-model:page-size="pagination.size"
              :page-sizes="[10,20,50]" :total="pagination.total"
              layout="total, sizes, prev, pager, next, jumper"
              @size-change="loadTags" @current-change="loadTags"></el-pagination>
          </div>
        </el-card>

        <!-- 新建/编辑弹窗 -->
        <el-dialog v-model="dialog.visible" :title="dialog.title" width="400px" destroy-on-close>
          <el-form :model="dialog.form" :rules="dialog.rules" ref="formRef" label-width="80px">
            <el-form-item label="标签名称" prop="name">
              <el-input v-model="dialog.form.name" placeholder="请输入标签名称（1-30字）" maxlength="30"></el-input>
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="dialog.visible = false">取消</el-button>
            <el-button type="primary" @click="handleSubmit">确定</el-button>
          </template>
        </el-dialog>
      </el-main>
    </el-container>
  </el-container>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue"></script>

<script>
const { createApp, ref, reactive, computed } = Vue;

const app = createApp({
  setup() {
    // 导航
    const appName = ref('DevPilot');
    const sidebarWidth = ref('220px');
    const menuList = ref([
      { key: '问题笔记管理', label: '📋 问题笔记', file: '../../问题笔记管理/低保真/问题笔记管理.html' },
      { key: '标签分类', label: '🏷 标签管理', file: '标签分类.html' },
    ]);
    const curFile = decodeURIComponent(location.pathname.split('/').pop() || location.href.split('/').pop() || '');
    const activeMenu = ref(menuList.value.find(m => m.file === curFile)?.key || menuList.value[0]?.key || '标签分类');
    const onMenuSelect = (key) => {
      const item = menuList.value.find(m => m.key === key);
      if (item && item.file !== curFile) window.location.href = item.file;
    };
    const currentUser = computed(() => {
      try { return JSON.parse(localStorage.getItem('devpilot_user') || '{}').username || '未登录'; }
      catch(e) { return '未登录'; }
    });
    const handleLogout = () => { localStorage.removeItem('devpilot_token'); localStorage.removeItem('devpilot_user'); window.location.href = '../../用户登录/低保真/用户登录.html'; };

    // Mock 标签数据
    const allTags = ref([
      { id: 1, name: 'JVM', noteCount: 12, createdAt: '2026-06-10 09:00' },
      { id: 2, name: 'OOM', noteCount: 8, createdAt: '2026-06-09 14:30' },
      { id: 3, name: '内存泄漏', noteCount: 5, createdAt: '2026-06-09 10:00' },
      { id: 4, name: '数据库', noteCount: 15, createdAt: '2026-06-08 16:00' },
      { id: 5, name: 'NPE', noteCount: 6, createdAt: '2026-06-07 11:00' },
      { id: 6, name: '线程池', noteCount: 3, createdAt: '2026-06-06 09:00' },
      { id: 7, name: 'Kubernetes', noteCount: 9, createdAt: '2026-06-05 15:00' },
      { id: 8, name: '网络超时', noteCount: 7, createdAt: '2026-06-04 08:00' },
      { id: 9, name: 'Redis', noteCount: 4, createdAt: '2026-06-03 13:00' },
      { id: 10, name: '微服务', noteCount: 11, createdAt: '2026-06-02 10:00' },
      { id: 11, name: '死锁', noteCount: 2, createdAt: '2026-06-01 17:00' },
      { id: 12, name: 'GC调优', noteCount: 6, createdAt: '2026-05-30 09:00' },
    ]);
    const tagList = ref([...allTags.value]);
    const pagination = reactive({ page: 1, size: 10, total: allTags.value.length });
    const loadTags = () => {
      const start = (pagination.page - 1) * pagination.size;
      tagList.value = allTags.value.slice(start, start + pagination.size);
    };
    loadTags();

    // 弹窗
    const formRef = ref(null);
    const dialog = reactive({
      visible: false, title: '新建标签', editingId: null,
      form: { name: '' },
      rules: {
        name: [{ required: true, message: '请输入标签名称', trigger: 'blur' }, { min:1, max:30, message:'标签名1-30字符', trigger:'blur' }],
      },
    });
    const handleAdd = () => {
      dialog.title = '新建标签'; dialog.editingId = null;
      dialog.form = { name: '' };
      dialog.visible = true;
    };
    const handleEdit = (row) => {
      dialog.title = '编辑标签'; dialog.editingId = row.id;
      dialog.form = { name: row.name };
      dialog.visible = true;
    };
    const handleSubmit = () => {
      formRef.value.validate((valid) => {
        if (!valid) return;
        const name = dialog.form.name.trim();
        const dup = allTags.value.find(t => t.name === name && t.id !== dialog.editingId);
        if (dup) { ElMessage.warning('标签名称已存在'); return; }
        if (dialog.editingId) {
          const idx = allTags.value.findIndex(t => t.id === dialog.editingId);
          if (idx >= 0) allTags.value[idx].name = name;
          ElMessage.success('编辑成功');
        } else {
          const newId = Math.max(...allTags.value.map(t => t.id), 0) + 1;
          allTags.value.push({ id: newId, name, noteCount: 0, createdAt: new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-') });
          ElMessage.success('创建成功');
        }
        pagination.total = allTags.value.length;
        loadTags();
        dialog.visible = false;
      });
    };
    const handleDelete = (row) => {
      allTags.value = allTags.value.filter(t => t.id !== row.id);
      pagination.total = allTags.value.length;
      loadTags();
      ElMessage.success('删除成功');
    };
    const handleViewNotes = (row) => {
      window.location.href = '../../问题笔记管理/低保真/问题笔记管理.html?tag=' + encodeURIComponent(row.name);
    };

    return {
      appName, sidebarWidth, menuList, activeMenu, curFile, onMenuSelect, currentUser, handleLogout,
      tagList, pagination, loadTags,
      dialog, formRef, handleAdd, handleEdit, handleSubmit, handleDelete, handleViewNotes,
    };
  }
});

for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component); }
app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
app.mount('#app');
</script>
</body>
</html>

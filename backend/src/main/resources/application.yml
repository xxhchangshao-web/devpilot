server:
  port: 8080

spring:
  application:
    name: devpilot

  # 默认使用 dev 配置
  profiles:
    active: dev

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.devpilot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:devpilot-jwt-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}  # 24小时，单位毫秒

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}
  demo:
    password: ${DEMO_PASSWORD:DevPilotDemo2026!}

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# ========== 开发环境 ==========
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:devpilot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true

  sql:
    init:
      mode: always

logging:
  level:
    com.devpilot: DEBUG
    org.springframework.security: DEBUG

---
# ========== 生产环境 ==========
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devpilot}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:devpilot}
    password: ${DB_PASSWORD}

  flyway:
    enabled: true

logging:
  level:
    com.devpilot: INFO
    org.springframework.security: WARN
    org.apache.ibatis: WARN
